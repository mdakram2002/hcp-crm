version: "3.8"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hcp_crm
    ports:
      - "5433:5432"      
    volumes:
      - hcp_crm_pgdata:/var/lib/postgresql/data

volumes:
  hcp_crm_pgdata:
